name: Python CI

on:
  push:
    branches:
      - main

jobs:
  python-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: python install pytest

      - name: Run Tests
        run: pytest -v